<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة | نبض</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #f8fafc;
        }

        .admin-card {
            background: white;
            border-radius: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: 0.3s;
        }

        .admin-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <!-- 🔐 Login -->
    <div id="loginOverlay"
        class="fixed inset-0 z-[200] bg-slate-900/95 backdrop-blur-md flex items-center justify-center p-4">

        <div class="bg-white p-8 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black mb-4">دخول الإدارة</h2>

            <input type="password" id="adminPass" placeholder="••••••"
                class="w-full p-4 rounded-xl bg-gray-100 text-center mb-4 outline-none">

            <button onclick="checkAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
                دخول
            </button>

            <p id="loginError" class="text-red-500 mt-3 hidden">كلمة المرور غلط ❌</p>
        </div>
    </div>

    <!-- 🧠 Admin Content -->
    <div id="adminContent" class="hidden max-w-5xl mx-auto">

        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black">لوحة الإدارة</h1>

            <button onclick="logoutToHome()" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold">
                خروج
            </button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">

            <div class="bg-white p-4 rounded-xl text-center">
                <p class="text-gray-400 text-sm">إجمالي الخدمات</p>
                <p id="totalCount" class="text-2xl font-black"></p>
            </div>

            <div class="bg-white p-4 rounded-xl text-center">
                <p class="text-gray-400 text-sm">في الانتظار</p>
                <p id="pendingCount" class="text-2xl font-black text-orange-500"></p>
            </div>

            <div class="bg-white p-4 rounded-xl text-center">
                <p class="text-gray-400 text-sm">تم الموافقة</p>
                <p id="approvedCount" class="text-2xl font-black text-green-600"></p>
            </div>

        </div>

        <!-- Services -->
        <div id="adminGrid" class="grid gap-4"></div>

    </div>

    <!-- 📦 Popup -->
    <div id="detailsModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">

        <div class="bg-white w-full max-w-lg rounded-3xl p-6 relative">

            <button onclick="closeDetails()" class="absolute top-4 left-4 text-gray-400 text-xl">✕</button>

            <h2 class="text-2xl font-black mb-4">بيانات الدكتور</h2>

            <div id="detailsContent" class="space-y-3 text-sm"></div>

        </div>
    </div>

    <script>

        const ADMIN_PASSWORD = "123";
        let services = JSON.parse(localStorage.getItem("sahaty_v3")) || [];

        // initialize fields
        services = services.map(s => ({
            ...s,
            approved: s.approved || false,
            paid: s.paid || false
        }));

        function save() {
            localStorage.setItem("sahaty_v3", JSON.stringify(services));
        }

        function checkAuth() {
            const pass = document.getElementById('adminPass').value;

            if (pass === ADMIN_PASSWORD) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('adminContent').classList.remove('hidden');
                renderAdmin();
            } else {
                const err = document.getElementById('loginError');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function renderAdmin() {

            const grid = document.getElementById('adminGrid');

            document.getElementById("totalCount").innerText = services.length;
            document.getElementById("pendingCount").innerText =
                services.filter(s => !s.approved).length;

            document.getElementById("approvedCount").innerText =
                services.filter(s => s.approved).length;

            if (services.length === 0) {
                grid.innerHTML = `<p class="text-center text-gray-400">لا يوجد بيانات</p>`;
                return;
            }

            grid.innerHTML = services.map(s => `
                <div class="admin-card p-5 flex flex-col md:flex-row justify-between items-center gap-4">

                    <div class="flex items-center gap-4 w-full">

                        <div class="w-14 h-14 bg-gray-100 rounded-xl flex items-center justify-center text-xl">
                            ${s.type === 'طبيب' ? '👨‍⚕️' : '🏥'}
                        </div>

                        <div>
                            <h3 class="font-black text-lg">${s.name}</h3>
                            <p class="text-sm text-gray-400">${s.spec}</p>

                            <span class="text-xs font-bold ${s.approved ? 'text-green-600' : 'text-orange-500'}">
                                ${s.approved ? '✔ موافق عليه' : '⏳ غير موافق'}
                            </span>

                            <p class="text-xs mt-1 ${s.paid ? 'text-green-600' : 'text-red-500'}">
                                ${s.paid ? '💰 تم الدفع' : '💸 لم يتم الدفع'}
                            </p>

                        </div>

                    </div>

                    <div class="flex items-center gap-2 shrink-0 flex-wrap">

                        <!-- Toggle Approval -->
                        <button onclick="toggleApprove(${s.id})"
                            class="${s.approved ? 'bg-green-600' : 'bg-gray-400'} text-white px-4 py-2 rounded-xl font-bold">
                            ${s.approved ? '✔ موافق' : '❌ غير موافق'}
                        </button>

                        <!-- Toggle Paid -->
                        <button onclick="togglePaid(${s.id})"
                            class="${s.paid ? 'bg-green-600' : 'bg-red-500'} text-white px-4 py-2 rounded-xl font-bold">
                            ${s.paid ? '💰 تم الدفع' : '💸 لم يتم الدفع'}
                        </button>

                        <button onclick="openDetails(${s.id})"
                            class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold">
                            عرض البيانات
                        </button>

                        <button onclick="deleteService(${s.id})"
                            class="bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold">
                            حذف
                        </button>

                    </div>

                </div>
            `).join('');
        }

        function toggleApprove(id) {
            const item = services.find(s => s.id === id);
            if (item) {
                item.approved = !item.approved;
                save();
                renderAdmin();
            }
        }

        function togglePaid(id) {
            const item = services.find(s => s.id === id);
            if (item) {
                item.paid = !item.paid;
                save();
                renderAdmin();
            }
        }

        function deleteService(id) {
            if (confirm('متأكد عايز تمسح؟')) {
                services = services.filter(s => s.id !== id);
                save();
                renderAdmin();
            }
        }

        function openDetails(id) {
            const service = services.find(s => s.id === id);
            if (!service) return;

            document.getElementById("detailsContent").innerHTML = `
                <p><strong>الاسم:</strong> ${service.name}</p>
                <p><strong>التخصص:</strong> ${service.spec}</p>
                <p><strong>العنوان:</strong> ${service.address}</p>
                <p><strong>الوصف:</strong> ${service.desc}</p>
                <p><strong>السعر:</strong> ${service.price} جنيه</p>

                <a href="https://wa.me/${service.phone}" target="_blank"
                    class="block text-center bg-green-500 text-white py-3 rounded-xl font-bold mt-4">
                    💬 واتساب
                </a>
            `;

            document.getElementById("detailsModal").classList.remove("hidden");
            document.getElementById("detailsModal").classList.add("flex");
        }

        function closeDetails() {
            document.getElementById("detailsModal").classList.add("hidden");
            document.getElementById("detailsModal").classList.remove("flex");
        }

        function logoutToHome() {
            window.location.href = "index1.html";
        }

        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });

    </script>

</body>

</html>
